services:
  mysql:
    image: mysql:8.0
    container_name: white-everyday-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: white_everyday
      MYSQL_USER: white
      MYSQL_PASSWORD: white
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
