spring:
  datasource:
    url: jdbc:h2:mem:white_everyday_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

jwt:
  secret: test-secret-test-secret-test-secret-test-secret
  access-token-validity-ms: 1800000
  refresh-token-validity-ms: 1209600000
